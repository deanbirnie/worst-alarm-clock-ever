name: Build APK

# Runs unit tests and builds a debug APK:
#   - on every push to main (the artifact for sideloading), and
#   - on every pull request targeting main (pre-merge verification — feature branches
#     get CI through their open PR, without the old duplicate push+PR double-runs).
# To get an installable APK without any local Android toolchain:
#   GitHub repo -> Actions tab -> latest "Build APK" run -> Artifacts ->
#   download "WorstAlarmEver-<version>-debug", unzip, sideload the .apk inside.
#   (GitHub always wraps artifact downloads in a zip — that part isn't
#   configurable — but the .apk file inside is named and versioned properly.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # GitHub's ubuntu runners ship with the Android SDK preinstalled;
      # the build downloads any missing platform/build-tools automatically.
      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WorstAlarmEver-${{ steps.version.outputs.name }}-debug
          path: app/build/outputs/apk/debug/WorstAlarmEver-*.apk
          if-no-files-found: error
