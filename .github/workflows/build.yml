name: Build APK

# Builds a debug APK on every push / PR and uploads it as a workflow artifact.
# To get an installable APK without any local Android toolchain:
#   GitHub repo -> Actions tab -> latest "Build APK" run -> Artifacts ->
#   download "worst-alarm-clock-debug-apk", unzip, sideload app-debug.apk.
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # GitHub's ubuntu runners ship with the Android SDK preinstalled;
      # the build downloads any missing platform/build-tools automatically.
      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: worst-alarm-clock-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
